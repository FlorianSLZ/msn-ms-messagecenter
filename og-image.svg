<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="MCD — M365 Change Digest">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="75%">
      <stop offset="0%" stop-color="#39A751" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#39A751" stop-opacity="0"/>
    </radialGradient>
    <pattern id="hatch" width="14" height="14" patternTransform="rotate(135)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#39A751" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c120b"/>
      <stop offset="100%" stop-color="#070907"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#000000"/>
  <rect width="1200" height="630" fill="url(#hatch)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- brand -->
  <g transform="translate(80,78)">
    <rect x="0" y="0" width="56" height="56" rx="15" fill="#39A751"/>
    <g fill="#ffffff">
      <rect x="11.4" y="31.5" width="7.5" height="13.1" rx="2.3"/>
      <rect x="24.2" y="22.8" width="7.5" height="21.8" rx="2.3" opacity=".9"/>
      <rect x="37" y="16.6" width="7.5" height="28" rx="2.3" opacity=".8"/>
    </g>
    <circle cx="40.8" cy="10.8" r="3.9" fill="#ffffff"/>
    <text x="74" y="26" font-family="Manrope, Segoe UI, sans-serif" font-size="27" font-weight="800" fill="#ffffff">MCD</text>
    <text x="74" y="50" font-family="Manrope, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#9aa1a8" letter-spacing="1">M365 CHANGE DIGEST</text>
  </g>

  <!-- headline -->
  <text x="80" y="270" font-family="Manrope, Segoe UI, sans-serif" font-size="68" font-weight="800" fill="#ffffff" letter-spacing="-2">Every Microsoft 365</text>
  <text x="80" y="346" font-family="Manrope, Segoe UI, sans-serif" font-size="68" font-weight="800" letter-spacing="-2"><tspan fill="#ffffff">change, </tspan><tspan fill="#39A751">in one place.</tspan></text>

  <text x="82" y="406" font-family="Manrope, Segoe UI, sans-serif" font-size="26" font-weight="500" fill="#9aa1a8">Filter by product, status &amp; cloud  ·  timeline per product  ·  search</text>

  <!-- status legend -->
  <g font-family="Manrope, Segoe UI, sans-serif" font-size="21" font-weight="700">
    <circle cx="92" cy="470" r="8" fill="#e0a014"/><text x="108" y="477" fill="#d2d7dc">In development</text>
    <circle cx="312" cy="470" r="8" fill="#2f86ee"/><text x="328" y="477" fill="#d2d7dc">Rolling out</text>
    <circle cx="492" cy="470" r="8" fill="#2fae57"/><text x="508" y="477" fill="#d2d7dc">Launched</text>
  </g>

  <!-- mock change cards (right) -->
  <g transform="translate(820,150)">
    <rect x="0" y="0" width="300" height="86" rx="16" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.1"/>
    <rect x="18" y="18" width="34" height="34" rx="9" fill="#5b5fc7"/>
    <rect x="66" y="20" width="150" height="13" rx="6" fill="#d2d7dc" opacity=".9"/>
    <rect x="66" y="42" width="110" height="10" rx="5" fill="#9aa1a8" opacity=".6"/>
    <rect x="214" y="20" width="68" height="22" rx="11" fill="#2fae57" opacity=".22"/>
    <circle cx="227" cy="31" r="4" fill="#2fae57"/><text x="236" y="35" font-family="Manrope" font-size="12" font-weight="700" fill="#2fae57">Launched</text>

    <rect x="0" y="102" width="300" height="86" rx="16" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.1"/>
    <rect x="18" y="120" width="34" height="34" rx="9" fill="#0a7dff"/>
    <rect x="66" y="122" width="160" height="13" rx="6" fill="#d2d7dc" opacity=".9"/>
    <rect x="66" y="144" width="120" height="10" rx="5" fill="#9aa1a8" opacity=".6"/>
    <rect x="206" y="122" width="76" height="22" rx="11" fill="#e0a014" opacity=".22"/>
    <circle cx="219" cy="133" r="4" fill="#e0a014"/><text x="228" y="137" font-family="Manrope" font-size="11" font-weight="700" fill="#e0a014">In dev</text>

    <rect x="0" y="204" width="300" height="86" rx="16" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.1"/>
    <rect x="18" y="222" width="34" height="34" rx="9" fill="#8b5cf6"/>
    <rect x="66" y="224" width="140" height="13" rx="6" fill="#d2d7dc" opacity=".9"/>
    <rect x="66" y="246" width="100" height="10" rx="5" fill="#9aa1a8" opacity=".6"/>
    <rect x="200" y="224" width="82" height="22" rx="11" fill="#2f86ee" opacity=".22"/>
    <circle cx="213" cy="235" r="4" fill="#2f86ee"/><text x="222" y="239" font-family="Manrope" font-size="11" font-weight="700" fill="#2f86ee">Rolling</text>
  </g>

  <!-- footer -->
  <text x="80" y="560" font-family="Manrope, Segoe UI, sans-serif" font-size="20" font-weight="600" fill="#9aa1a8">mcd.dev</text>
  <text x="1120" y="560" text-anchor="end" font-family="Manrope, Segoe UI, sans-serif" font-size="17" fill="#5b6168">Independent project — not affiliated with Microsoft</text>
</svg>
